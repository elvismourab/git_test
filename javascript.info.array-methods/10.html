<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Shuffle an array</title>
</head>

<body>
    <script>
        // Fisher Yates / Knuth Shuffle
        // 1. Start from the last element in the array;
        // 2. Variable x receives a random number between '0' and the current index of 'arr' (exclusive);
        // 3. Switch the element at the current index with the element at 'x' position;
        // 4. Decrease the current index by 1 (move to the previous array element) and repeat steps 2-3 until the current index === 0;
        function shuffle(arr) {
            for (let i = arr.length; i; i--) {
                const x = Math.floor(Math.random() * i);
                const elem = arr[i - 1];
                arr[i - 1] = arr[x];
                arr[x] = elem;
            }
            return arr;
        }

        let arr = [1, 2, 3];

        shuffle(arr);
        // arr = [3, 2, 1]

        shuffle(arr);
        // arr = [2, 1, 3]

        shuffle(arr);
        // arr = [3, 1, 2]
        // ...
        console.log(shuffle(arr));
        console.log(shuffle(arr));
        console.log(shuffle(arr));
    </script>
</body>

</html>
