<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Create keyed object from array</title>
</head>

<body>
    <script>
        // This function uses reduce() to transform an array into an object.
        // It iterates through the array, assigning each element to a property in the object.
        // The property key is the 'id' of the element, and the property value is the element itself.
        // After iterating through all elements, it returns the final object.
        function groupById(array) {
            return array.reduce((obj, value) => {
                obj[value.id] = value;
                return obj;
            }, {})
        }

        let users = [
            { id: 'john', name: "John Smith", age: 20 },
            { id: 'ann', name: "Ann Smith", age: 24 },
            { id: 'pete', name: "Pete Peterson", age: 31 },
        ];

        let usersById = groupById(users);

        /*
        // after the call we should have:
        
        usersById = {
          john: {id: 'john', name: "John Smith", age: 20},
          ann: {id: 'ann', name: "Ann Smith", age: 24},
          pete: {id: 'pete', name: "Pete Peterson", age: 31},
        }
        */
    </script>
</body>

</html>
