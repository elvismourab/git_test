<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Filter range</title>
</head>

<body>
    <script>
        // This function checks if item is >= a AND item is <= b, filter() method returns true if criteria is matched and continue to loop over the array until all items are checked.
        function filterRange(arr, a, b) {
            return arr.filter((item) => {
                if (item >= a && item <= b) {
                    return item;
                }
            })
        }

        let arr = [5, 3, 8, 1];

        let filtered = filterRange(arr, 1, 4);

        alert(filtered); // 3,1 (matching values)

        alert(arr); // 5,3,8,1 (not modified)
    </script>
</body>

</html>
