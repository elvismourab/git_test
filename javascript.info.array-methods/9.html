<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Sort users by age</title>
</head>

<body>
    <script>
        let john = { name: "John", age: 25 };
        let pete = { name: "Pete", age: 30 };
        let mary = { name: "Mary", age: 28 };

        let arr = [pete, john, mary];

        // The sort function works with the provided compare function, it will compare the 'a.age' with 'b.age' using the 'build-in' operator and sort ascending the elements.
        function sortByAge(arr) {
            return arr.sort((a, b) => a.age - b.age);
        }

        sortByAge(arr);

        // now: [john, mary, pete]
        alert(arr[0].name); // John
        alert(arr[1].name); // Mary
        alert(arr[2].name); // Pete
    </script>
</body>

</html>
