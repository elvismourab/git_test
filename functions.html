<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset ="UTF-8">
    </head>
    <body>
        <script>
            function add7(x) {
                return x + 7;
            }

            function multiply(x, y) {
                return x * y;
            }

            function capitalize(x) {
                let y = x.charAt(0).toUpperCase() + x.slice(1);
                return y;
            }

            function lastLetter(x) {
                return x.slice(-1);
            }

            console.log(multiply(7, 5));

            console.log(capitalize("viva las vegas"));
            console.log(capitalize("burning LOVE"));
            console.log(capitalize("FeVeR"));

            console.log(lastLetter("Trouble"));
            console.log(lastLetter("hound DOG"));

        </script>
    </body>
</html>
